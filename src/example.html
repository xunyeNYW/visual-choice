<h2>哪个布局更适合？</h2>
<p class="subtitle">考虑可读性和视觉层次</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>单栏布局</h3>
      <p>简洁专注的阅读体验</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>双栏布局</h3>
      <p>侧边导航 + 主要内容区</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>网格布局</h3>
      <p>卡片式多列展示</p>
    </div>
  </div>
</div>

<div class="section">
  <p class="label">设计说明</p>
  <p>选择你认为最适合内容展示的布局方式。考虑因素：</p>
  <ul style="margin-top: 0.5rem; color: #64748b;">
    <li>内容可读性</li>
    <li>导航便捷性</li>
    <li>视觉平衡感</li>
  </ul>
</div>
